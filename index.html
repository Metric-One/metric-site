<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1B3A" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#EAF1FF" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Know your true net profit. Not just revenue." />
    <title>METRICS — Know your true net profit.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('mx-theme')
          var dark = stored ? stored === 'dark' : false
          var el = document.documentElement
          el.classList.toggle('dark', dark)
          el.classList.toggle('light', !dark)
          el.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {}
      })()
    </script>
  </head>
  <body class="bg-bg text-fg font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
